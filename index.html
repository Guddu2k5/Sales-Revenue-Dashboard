<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sales & Revenue Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<header>

<h1>📊 Sales & Revenue Dashboard</h1>

</header>

<main>

<section class="cards">

<div class="card">
<h2>Total Revenue</h2>
<p id="revenue">₹0</p>
</div>

<div class="card">
<h2>Total Sales</h2>
<p id="sales">0</p>
</div>

<div class="card">
<h2>Total Orders</h2>
<p id="orders">0</p>
</div>

<div class="card">
<h2>Average Order Value</h2>
<p id="avgOrder">₹0</p>
</div>

</section>

<section class="charts">

<div class="chart-box">
<canvas id="revenueChart"></canvas>
</div>

<div class="chart-box">
<canvas id="salesChart"></canvas>
</div>

<div class="chart-box">
<canvas id="categoryChart"></canvas>
</div>

<div class="chart-box">
<canvas id="regionChart"></canvas>
</div>

</section>

<section>

<h2>Recent Orders</h2>

<table>

<thead>

<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Product</th>
<th>Region</th>
<th>Amount</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
