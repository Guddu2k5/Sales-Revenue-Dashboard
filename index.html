<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2>📊 Dashboard</h2>

        <nav>
            <ul>
                <li class="active">🏠 Home</li>
                <li>📈 Analytics</li>
                <li>🛒 Sales</li>
                <li>👥 Customers</li>
                <li>⚙️ Settings</li>
            </ul>
        </nav>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <header class="topbar">

            <h1>Sales & Revenue Dashboard</h1>

            <button id="themeBtn">🌙 Dark Mode</button>

        </header>

        <!-- KPI Cards -->
        <section class="cards">

            <div class="card">
                <h3>Total Revenue</h3>
                <p id="revenue">₹0</p>
            </div>

            <div class="card">
                <h3>Total Sales</h3>
                <p id="sales">0</p>
            </div>

            <div class="card">
                <h3>Total Orders</h3>
                <p id="orders">0</p>
            </div>

            <div class="card">
                <h3>Average Order</h3>
                <p id="avgOrder">₹0</p>
            </div>

        </section>

        <!-- Charts -->
        <section class="charts">

            <div class="chart-box">
                <canvas id="revenueChart"></canvas>
            </div>

            <div class="chart-box">
                <canvas id="salesChart"></canvas>
            </div>

            <div class="chart-box">
                <canvas id="categoryChart"></canvas>
            </div>

            <div class="chart-box">
                <canvas id="regionChart"></canvas>
            </div>

        </section>

        <!-- Table -->
        <section class="table-section">

            <h2>Recent Orders</h2>

            <table>

                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Region</th>
                        <th>Amount</th>
                    </tr>
                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>
